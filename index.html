<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Browse and search Rock Band 3 songs from your RPCS3 library" />
  <title>Gig-E's Rock Band Songs DB</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css?v=12" />
</head>
<body>
  <header>
    <h1>Gig-E's Rock Band Songs DB</h1>
    <div class="badge" id="status">Loading catalog…</div>
    <div class="meta" id="last-updated">Last built: —</div>
    <div class="header-actions">
      <a href="queue.html" class="admin-link">📋 Queue</a>
      <a href="admin.html" class="admin-link">⚙️ Admin</a>
      <button class="settings-btn" id="settings-btn">Settings</button>
    </div>
  </header>

  <main>
    <section class="panel filters-panel">
      <div class="controls">
        <div class="search-wrap">
          <label for="search">Search</label>
          <input id="search" type="text" placeholder="Artist, title, album, pack…" autocomplete="off" />
        </div>
        <div class="chip-bar" id="chip-bar">
          <button type="button" class="filter-chip-btn" data-filter="artist">Artist</button>
          <button type="button" class="filter-chip-btn" data-filter="title">Title</button>
          <button type="button" class="filter-chip-btn" data-filter="type">Type</button>
          <button type="button" class="filter-chip-btn" data-filter="genre">Genre</button>
          <button type="button" class="filter-chip-btn" data-filter="year">Decade</button>
          <button type="button" class="filter-chip-btn" data-filter="eurovision">Eurovision</button>
        </div>
        <div class="controls-actions">
          <button class="ghost" id="reset">Reset filters</button>
        </div>
      </div>
      <div class="notice" id="notice"></div>
    </section>

    <section class="panel queue-panel">
      <div class="queue-header">
        <h3>Request Queue</h3>
        <span class="badge" id="queue-count">0 in queue</span>
      </div>
      <div class="queue-name-row">
        <label for="requester-name">Your name</label>
        <input id="requester-name" type="text" placeholder="Enter your name to request songs" maxlength="40" autocomplete="off" list="requester-history" />
        <datalist id="requester-history"></datalist>
      </div>
      <div class="queue-list" id="queue-list"></div>
    </section>

    <section class="panel">
      <div class="badge" id="count">0 songs</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Artist</th>
              <th>Title</th>
              <th>Album</th>
              <th>Year</th>
              <th>Type</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="songs-body"></tbody>
        </table>
        <div id="song-cards" class="song-cards"></div>
      </div>
    </section>

  </main>

  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="settings-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="dev-hdd0-path">dev_hdd0 Directory Path</label>
          <input type="text" id="dev-hdd0-path" placeholder="/home/user/.config/rpcs3/dev_hdd0" />
          <div class="setting-hint">Absolute path to your RPCS3 dev_hdd0 directory containing songs.dta files</div>
          <div class="setting-status" id="path-status"></div>
        </div>
        <div class="modal-actions">
          <button class="primary" id="save-settings">Save & Rebuild</button>
          <button class="ghost" id="validate-path">Validate Path</button>
        </div>
      </div>
    </div>
  </div>

  <div class="chip-backdrop" id="chip-backdrop"></div>
  <div class="chip-popover" id="chip-popover" role="dialog" aria-modal="true">
    <div class="chip-popover-header">
      <span class="chip-popover-title" id="chip-popover-title"></span>
      <button type="button" class="chip-popover-close" id="chip-popover-close" aria-label="Close">&times;</button>
    </div>
    <input type="text" class="chip-popover-search" id="chip-popover-search" placeholder="Filter…" autocomplete="off" />
    <div class="chip-popover-options" id="chip-popover-options"></div>
  </div>

  <script src="app.js?v=11"></script>
</body>
</html>
